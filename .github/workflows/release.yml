name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build stdlib tarball
        run: |
          mkdir -p staging/stdlib
          cp -r stdlib/* staging/stdlib/
          cp LICENSE LICENSE-GPL README.md VENDOR-README.md staging/stdlib/
          echo '*' > staging/stdlib/.gitignore
          tar -czvf "sysml-stdlib-v${{ steps.version.outputs.version }}.tar.gz" -C staging stdlib

      - name: Build redlib tarball
        run: |
          mkdir -p staging/redlib
          cp -r redlib/* staging/redlib/
          cp LICENSE LICENSE-GPL README.md VENDOR-README.md staging/redlib/
          echo '*' > staging/redlib/.gitignore
          tar -czvf "sysml-redlib-v${{ steps.version.outputs.version }}.tar.gz" -C staging redlib

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sysml-stdlib-v${{ steps.version.outputs.version }}.tar.gz
            sysml-redlib-v${{ steps.version.outputs.version }}.tar.gz
